<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#01070b" />
  <title>Benaya Arlen | Adaptive Holographic Portfolio</title>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js"
      }
    }
  </script>

  <style>
    :root {
      --bg: #01070b;
      --cyan: #58f7ff;
      --white: #efffff;
      --muted: #8eb6c0;
      --panel: rgba(2, 15, 23, 0.94);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--white);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, a {
      font: inherit;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    a { text-decoration: none; }

    #scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .vignette,
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .vignette {
      z-index: 3;
      background: radial-gradient(circle at center, transparent 42%, rgba(0, 3, 6, .78) 100%);
    }

    .scanlines {
      z-index: 4;
      opacity: .09;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(88,247,255,.12) 4px);
    }

    .header {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 20;
      min-height: 72px;
      padding: max(14px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) 12px max(20px, env(safe-area-inset-left));
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(1,7,11,.93), transparent);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--cyan);
      border-radius: 50%;
      color: var(--cyan);
      font-size: .72rem;
      font-weight: 900;
      box-shadow: inset 0 0 17px rgba(88,247,255,.25), 0 0 18px rgba(88,247,255,.3);
    }

    .brand-copy strong,
    .brand-copy span { display: block; }

    .brand-copy strong { font-size: .78rem; }

    .brand-copy span {
      margin-top: 4px;
      color: var(--muted);
      font-size: .53rem;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
      font-size: .61rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #67ffb2;
      box-shadow: 0 0 12px #67ffb2;
    }

    .intro {
      position: fixed;
      left: max(24px, env(safe-area-inset-left));
      top: 50%;
      z-index: 15;
      width: min(390px, 34vw);
      transform: translateY(-50%);
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .intro small {
      color: var(--cyan);
      font-size: .66rem;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .intro h1 {
      margin: 14px 0 0;
      font-size: clamp(2.7rem, 5.7vw, 6rem);
      line-height: .86;
      letter-spacing: -.06em;
      text-transform: uppercase;
      text-shadow: 0 0 7px rgba(239,255,255,.62), 0 0 22px rgba(88,247,255,.24);
    }

    .intro h1 span {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1px rgba(88,247,255,.78);
    }

    .intro p {
      color: var(--muted);
      line-height: 1.7;
      font-size: .9rem;
    }

    .mode-badge {
      margin-top: 18px;
      display: inline-flex;
      padding: 7px 10px;
      border: 1px solid rgba(88,247,255,.24);
      color: var(--cyan);
      background: rgba(88,247,255,.04);
      font-size: .57rem;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .zoom-indicator {
      position: fixed;
      right: max(22px, env(safe-area-inset-right));
      bottom: max(20px, env(safe-area-inset-bottom));
      z-index: 12;
      width: 180px;
      padding: 12px;
      border: 1px solid rgba(88,247,255,.2);
      background: rgba(2,15,23,.72);
      backdrop-filter: blur(10px);
    }

    .zoom-indicator strong {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      color: var(--cyan);
      font-size: .58rem;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .zoom-track {
      height: 3px;
      margin-top: 9px;
      background: rgba(88,247,255,.13);
    }

    .zoom-fill {
      width: 50%;
      height: 100%;
      background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan);
    }

    .info-panel {
      position: fixed;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      z-index: 30;
      width: min(720px, calc(100% - 36px));
      padding: clamp(24px, 4vw, 42px);
      border: 1px solid rgba(88,247,255,.48);
      border-radius: 17px;
      background: linear-gradient(135deg, rgba(88,247,255,.1), transparent 42%), var(--panel);
      box-shadow: inset 0 0 30px rgba(88,247,255,.06), 0 0 40px rgba(0,217,255,.22);
      backdrop-filter: blur(17px);
      transform: translate(-50%, calc(100% + 70px));
      opacity: 0;
      visibility: hidden;
      transition: transform .38s cubic-bezier(.2,.8,.2,1), opacity .24s ease, visibility .24s ease;
    }

    .info-panel.open {
      transform: translate(-50%, 0);
      opacity: 1;
      visibility: visible;
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .kicker {
      color: var(--cyan);
      font-size: .62rem;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .info-panel h2 {
      margin: 10px 0 0;
      font-size: clamp(1.9rem, 5vw, 3.8rem);
      line-height: .95;
      letter-spacing: -.04em;
      text-transform: uppercase;
    }

    .info-panel p {
      color: #aac9d0;
      line-height: 1.72;
    }

    .tags,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tags span {
      padding: 6px 9px;
      border: 1px solid rgba(88,247,255,.2);
      color: var(--cyan);
      font-size: .57rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .actions { margin-top: 24px; }

    .action,
    .close {
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid rgba(88,247,255,.5);
      color: var(--white);
      background: rgba(88,247,255,.08);
      font-size: .65rem;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .close {
      min-width: 40px;
      padding: 0;
      color: var(--cyan);
    }

    .project-menu {
      position: fixed;
      right: max(22px, env(safe-area-inset-right));
      top: 50%;
      z-index: 25;
      width: min(320px, 30vw);
      padding: 18px;
      border: 1px solid rgba(88,247,255,.3);
      border-radius: 12px;
      background: rgba(2,15,23,.9);
      backdrop-filter: blur(13px);
      transform: translateY(-50%) translateX(calc(100% + 50px));
      opacity: 0;
      transition: .32s ease;
    }

    .project-menu.open {
      transform: translateY(-50%) translateX(0);
      opacity: 1;
    }

    .menu-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--cyan);
      font-size: .6rem;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .menu-list {
      margin-top: 14px;
      display: grid;
      gap: 8px;
    }

    .menu-item {
      min-height: 46px;
      padding: 0 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(88,247,255,.16);
      color: var(--muted);
      background: rgba(88,247,255,.02);
      cursor: pointer;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      background: #01070b;
      transition: .5s ease;
    }

    .loading.hide {
      opacity: 0;
      visibility: hidden;
    }

    .loader {
      width: 82px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid var(--cyan);
      border-radius: 50%;
      color: var(--cyan);
      font-weight: 900;
      box-shadow: 0 0 24px rgba(88,247,255,.35);
      animation: spin 2s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 980px) {
      .intro {
        top: 100px;
        left: 50%;
        width: min(720px, calc(100% - 40px));
        transform: translateX(-50%);
        text-align: center;
      }

      .intro h1 { font-size: clamp(2.5rem, 11vw, 5.2rem); }

      .project-menu {
        top: auto;
        left: 18px;
        right: 18px;
        bottom: max(18px, env(safe-area-inset-bottom));
        width: auto;
        transform: translateY(calc(100% + 50px));
      }

      .project-menu.open { transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .brand-copy,
      .status { display: none; }

      .intro { top: 82px; }
      .intro p { display: none; }

      .zoom-indicator {
        right: 12px;
        bottom: 12px;
        width: 145px;
      }

      .info-panel {
        max-height: 64svh;
        overflow-y: auto;
      }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="vignette"></div>
  <div class="scanlines"></div>

  <div class="loading" id="loading">
    <div class="loader">BA</div>
  </div>

  <header class="header">
    <button class="brand" id="resetButton" type="button">
      <span class="brand-mark">BA</span>
      <span class="brand-copy">
        <strong>Benaya Arlen</strong>
        <span>Adaptive Holographic System</span>
      </span>
    </button>
    <div class="status">System Online</div>
  </header>

  <aside class="intro" id="intro">
    <small>Interactive Portfolio / 2026</small>
    <h1>Benaya <span>Arlen</span></h1>
    <p>Geser untuk memutar, scroll atau pinch untuk mengubah mode tampilan.</p>
    <span class="mode-badge" id="modeBadge">Globe Mode</span>
  </aside>

  <div class="zoom-indicator">
    <strong><span>Zoom</span><span id="zoomText">100%</span></strong>
    <div class="zoom-track"><div class="zoom-fill" id="zoomFill"></div></div>
  </div>

  <aside class="project-menu" id="projectMenu">
    <div class="menu-head">
      <span>Project Navigation</span>
      <button class="close" id="closeMenu" type="button">×</button>
    </div>
    <div class="menu-list" id="menuList"></div>
  </aside>

  <section class="info-panel" id="infoPanel">
    <div class="panel-top">
      <div>
        <span class="kicker" id="infoKicker"></span>
        <h2 id="infoTitle"></h2>
      </div>
      <button class="close" id="closeInfo" type="button">×</button>
    </div>
    <p id="infoDescription"></p>
    <div class="tags" id="tags"></div>
    <div class="actions" id="actions"></div>
  </section>

  <script type="module">
    import * as THREE from "three";

    const DATA = [
      {
        id: "menu", type: "system", icon: "☰", label: "Menu",
        latitude: 18, longitude: -28,
        kicker: "SYSTEM NODE", title: "Project Menu",
        description: "Menampilkan daftar proyek pada sistem hologram.", tech: []
      },
      {
        id: "about", type: "system", icon: "i", label: "Tentang Saya",
        latitude: 47, longitude: 47,
        kicker: "IDENTITY NODE", title: "Benaya Arlen",
        description: "Software developer dan AI enthusiast yang tertarik pada pengembangan web, aplikasi, antarmuka interaktif, pengolahan data, dan kecerdasan buatan.",
        tech: ["Web Development", "Artificial Intelligence", "UI Exploration"],
        links: [{ label: "GitHub", href: "https://github.com/benayaarlen-creator", external: true }]
      },
      {
        id: "emotion", type: "project", icon: "AI", label: "Emotion Recognition",
        latitude: -7, longitude: 15,
        kicker: "PROJECT NODE / 001", title: "Multimodal Emotion Recognition",
        description: "Sistem deteksi emosi audio-visual menggunakan CRNN dan Model-Level Fusion pada dataset RAVDESS.",
        tech: ["Python", "TensorFlow", "OpenCV", "CRNN"],
        links: [{ label: "Open", href: "#" }]
      },
      {
        id: "chatbot", type: "project", icon: "CB", label: "Medical Chatbot",
        latitude: 24, longitude: 122,
        kicker: "PROJECT NODE / 002", title: "Medical Chatbot",
        description: "Chatbot berbasis Natural Language Processing untuk memahami gejala awal dan menghasilkan respons percakapan terstruktur.",
        tech: ["Python", "RASA NLU", "NLP"],
        links: [{ label: "Open", href: "chatbot.html" }]
      },
      {
        id: "onda", type: "project", icon: "OP", label: "Onda Printing",
        latitude: -34, longitude: 82,
        kicker: "PROJECT NODE / 003", title: "Onda Printing Website",
        description: "Website perusahaan responsif untuk menampilkan profil, layanan, produk, dan kontak Onda Printing.",
        tech: ["HTML", "CSS", "JavaScript"],
        links: [{ label: "Open", href: "OP.html" }]
      },
      {
        id: "portfolio", type: "project", icon: "3D", label: "Holographic Portfolio",
        latitude: -26, longitude: -75,
        kicker: "PROJECT NODE / 004", title: "Adaptive Holographic Portfolio",
        description: "Portofolio Three.js dengan mode globe, flat data map, dan solar orbit.",
        tech: ["Three.js", "WebGL", "JavaScript"],
        links: [{ label: "Repository", href: "https://github.com/benayaarlen-creator/New-folder", external: true }]
      },
      {
        id: "contact", type: "system", icon: "@", label: "Kontak",
        latitude: 4, longitude: 194,
        kicker: "COMMUNICATION NODE", title: "Hubungi Saya",
        description: "Terbuka untuk peluang kerja, magang, pengembangan website, dan kolaborasi proyek.",
        tech: ["Email", "GitHub"],
        links: [
          { label: "Email", href: "mailto:gammablacksmitch@gmail.com" },
          { label: "GitHub", href: "https://github.com/benayaarlen-creator", external: true }
        ]
      }
    ];

    const canvas = document.getElementById("scene");
    const loading = document.getElementById("loading");
    const modeBadge = document.getElementById("modeBadge");
    const zoomText = document.getElementById("zoomText");
    const zoomFill = document.getElementById("zoomFill");
    const intro = document.getElementById("intro");
    const projectMenu = document.getElementById("projectMenu");
    const menuList = document.getElementById("menuList");
    const infoPanel = document.getElementById("infoPanel");
    const infoKicker = document.getElementById("infoKicker");
    const infoTitle = document.getElementById("infoTitle");
    const infoDescription = document.getElementById("infoDescription");
    const tags = document.getElementById("tags");
    const actions = document.getElementById("actions");

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x01070b, 0.05);

    const camera = new THREE.PerspectiveCamera(44, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 0.3, 8.7);

    const renderer = new THREE.WebGLRenderer({
      canvas, antialias: true, powerPreference: "high-performance"
    });
    renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 1.7));
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearColor(0x01070b);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const world = new THREE.Group();
    scene.add(world);

    const globe = new THREE.Group();
    world.add(globe);

    const solar = new THREE.Group();
    world.add(solar);
    solar.visible = false;

    const R = 2.55;
    const pointCount = innerWidth < 700 ? 2600 : 4800;

    const spherePositions = new Float32Array(pointCount * 3);
    const flatPositions = new Float32Array(pointCount * 3);
    const workingPositions = new Float32Array(pointCount * 3);

    for (let i = 0; i < pointCount; i++) {
      const u = Math.random();
      const v = Math.random();
      const theta = Math.PI * 2 * u;
      const phi = Math.acos(2 * v - 1);

      const x = R * Math.sin(phi) * Math.cos(theta);
      const y = R * Math.cos(phi);
      const z = R * Math.sin(phi) * Math.sin(theta);

      spherePositions[i * 3] = x;
      spherePositions[i * 3 + 1] = y;
      spherePositions[i * 3 + 2] = z;

      flatPositions[i * 3] = x;
      flatPositions[i * 3 + 1] = y;
      flatPositions[i * 3 + 2] = 0;

      workingPositions[i * 3] = x;
      workingPositions[i * 3 + 1] = y;
      workingPositions[i * 3 + 2] = z;
    }

    const pointGeometry = new THREE.BufferGeometry();
    pointGeometry.setAttribute("position", new THREE.BufferAttribute(workingPositions, 3));

    const pointMaterial = new THREE.PointsMaterial({
      color: 0x40eaff,
      size: innerWidth < 700 ? 0.028 : 0.022,
      transparent: true,
      opacity: 0.82,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const pointCloud = new THREE.Points(pointGeometry, pointMaterial);
    globe.add(pointCloud);

    const glow = new THREE.Mesh(
      new THREE.SphereGeometry(R * 1.02, 64, 64),
      new THREE.MeshBasicMaterial({
        color: 0x16dfff, transparent: true, opacity: 0.025,
        side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
      })
    );
    globe.add(glow);

    function createRing(radius, opacity) {
      const pts = [];
      for (let i = 0; i <= 180; i++) {
        const a = (i / 180) * Math.PI * 2;
        pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
      }
      const geometry = new THREE.BufferGeometry().setFromPoints(pts);
      return new THREE.LineLoop(
        geometry,
        new THREE.LineBasicMaterial({
          color: 0x58f7ff, transparent: true, opacity,
          blending: THREE.AdditiveBlending, depthWrite: false
        })
      );
    }

    const orbitA = createRing(R * 1.3, 0.18);
    orbitA.rotation.set(1.1, 0.2, 0.15);
    const orbitB = createRing(R * 1.45, 0.12);
    orbitB.rotation.set(0.45, 1.1, -0.25);
    globe.add(orbitA, orbitB);

    function latLon(lat, lon, radius = R + 0.12) {
      const a = THREE.MathUtils.degToRad(lat);
      const b = THREE.MathUtils.degToRad(lon);
      return new THREE.Vector3(
        radius * Math.cos(a) * Math.cos(b),
        radius * Math.sin(a),
        radius * Math.cos(a) * Math.sin(b)
      );
    }

    function iconTexture(text) {
      const c = document.createElement("canvas");
      c.width = c.height = 256;
      const x = c.getContext("2d");

      const g = x.createRadialGradient(128,128,10,128,128,128);
      g.addColorStop(0, "rgba(235,255,255,.95)");
      g.addColorStop(.18, "rgba(88,247,255,.45)");
      g.addColorStop(.6, "rgba(0,217,255,.08)");
      g.addColorStop(1, "rgba(0,217,255,0)");
      x.fillStyle = g;
      x.fillRect(0,0,256,256);

      x.beginPath();
      x.arc(128,128,78,0,Math.PI*2);
      x.fillStyle = "rgba(3,25,37,.92)";
      x.fill();
      x.lineWidth = 5;
      x.strokeStyle = "#58f7ff";
      x.shadowColor = "#58f7ff";
      x.shadowBlur = 20;
      x.stroke();

      x.fillStyle = "#efffff";
      x.font = `900 ${text.length > 1 ? 54 : 78}px system-ui`;
      x.textAlign = "center";
      x.textBaseline = "middle";
      x.fillText(text,128,130);

      const t = new THREE.CanvasTexture(c);
      t.colorSpace = THREE.SRGBColorSpace;
      return t;
    }

    const nodes = [];
    const rayTargets = [];
    const zAxis = new THREE.Vector3(0,0,1);

    DATA.forEach((data, index) => {
      const group = new THREE.Group();
      const globePos = latLon(data.latitude, data.longitude);
      group.position.copy(globePos);

      const plane = new THREE.Mesh(
        new THREE.PlaneGeometry(data.id === "about" ? 0.72 : 0.58, data.id === "about" ? 0.72 : 0.58),
        new THREE.MeshBasicMaterial({
          map: iconTexture(data.icon),
          transparent: true,
          side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      );
      plane.userData = data;

      // Ikon menempel secara tangensial pada permukaan globe.
      group.quaternion.setFromUnitVectors(zAxis, globePos.clone().normalize());
      group.add(plane);
      globe.add(group);

      const flatAngle = (index / DATA.length) * Math.PI * 2;
      const flatPos = new THREE.Vector3(
        Math.cos(flatAngle) * 2.2,
        Math.sin(flatAngle) * 1.55,
        0.08
      );

      nodes.push({
        data,
        group,
        plane,
        globePos: globePos.clone(),
        flatPos,
        solarAngle: (index / DATA.length) * Math.PI * 2,
        solarRadius: data.id === "about" ? 0 : 1.2 + (index % 3) * 0.65
      });

      rayTargets.push(plane);
    });

    // Solar orbit rings
    [1.2, 1.85, 2.5].forEach((radius) => {
      const ring = createRing(radius, 0.16);
      ring.rotation.x = Math.PI / 2;
      solar.add(ring);
    });

    // Stars
    const starCount = innerWidth < 700 ? 750 : 1300;
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const rr = 16 + Math.random() * 30;
      const a = Math.random() * Math.PI * 2;
      const b = Math.acos(2 * Math.random() - 1);
      starPos[i*3] = rr * Math.sin(b) * Math.cos(a);
      starPos[i*3+1] = rr * Math.cos(b);
      starPos[i*3+2] = rr * Math.sin(b) * Math.sin(a);
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute("position", new THREE.BufferAttribute(starPos,3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ color:0x9df9ff, size:.035, transparent:true, opacity:.55 })
    );
    scene.add(stars);

    let rotationX = 0;
    let rotationY = 0;
    let targetRotationX = 0;
    let targetRotationY = 0;

    let zoom = 1;
    let targetZoom = 1;

    let dragging = false;
    let lastX = 0;
    let lastY = 0;
    let moved = 0;

    const pointers = new Map();
    let lastPinch = 0;

    let mode = "globe";
    let flatBlend = 0;
    let solarBlend = 0;
    let focusAnim = null;

    function smoothstep(edge0, edge1, x) {
      const t = THREE.MathUtils.clamp((x-edge0)/(edge1-edge0),0,1);
      return t*t*(3-2*t);
    }

    function updateMode() {
      flatBlend = smoothstep(1.35, 1.55, zoom);
      solarBlend = 1 - smoothstep(0.25, 0.42, zoom);

      if (solarBlend > 0.55) mode = "solar";
      else if (flatBlend > 0.55) mode = "flat";
      else mode = "globe";

      modeBadge.textContent =
        mode === "solar" ? "Solar Orbit Mode" :
        mode === "flat" ? "Flat Data Mode" :
        "Globe Mode";

      const percent = Math.round(zoom * 100);
      zoomText.textContent = `${percent}%`;
      zoomFill.style.width = `${THREE.MathUtils.clamp((zoom-.25)/1.35*100,0,100)}%`;
    }

    function getPinchDistance() {
      const p = [...pointers.values()];
      return p.length < 2 ? 0 : Math.hypot(p[0].x-p[1].x, p[0].y-p[1].y);
    }

    canvas.addEventListener("pointerdown", e => {
      canvas.setPointerCapture(e.pointerId);
      pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
      dragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
      moved = 0;
      if (pointers.size === 2) lastPinch = getPinchDistance();
    });

    canvas.addEventListener("pointermove", e => {
      if (!pointers.has(e.pointerId)) return;
      pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});

      if (pointers.size === 2) {
        const d = getPinchDistance();
        if (lastPinch > 0) {
          targetZoom += (d-lastPinch)*0.003;
          targetZoom = THREE.MathUtils.clamp(targetZoom,.25,1.65);
        }
        lastPinch = d;
        return;
      }

      if (!dragging) return;
      const dx = e.clientX-lastX;
      const dy = e.clientY-lastY;
      moved += Math.abs(dx)+Math.abs(dy);

      if (mode !== "solar") {
        targetRotationY += dx*.0065;
        targetRotationX += dy*.005;
        targetRotationX = THREE.MathUtils.clamp(targetRotationX,-1.4,1.4);
      }

      lastX=e.clientX;
      lastY=e.clientY;
    });

    canvas.addEventListener("pointerup", e => {
      const tap = moved < 10 && pointers.size <= 1;
      pointers.delete(e.pointerId);
      if (pointers.size === 0) {
        dragging=false;
        lastPinch=0;
      }

      if (tap) {
        const mouse = new THREE.Vector2(
          e.clientX/innerWidth*2-1,
          -(e.clientY/innerHeight)*2+1
        );
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse,camera);
        const hit = ray.intersectObjects(rayTargets,false)[0];
        if (hit) selectNode(hit.object.userData.id);
      }
    });

    canvas.addEventListener("wheel", e => {
      e.preventDefault();
      targetZoom -= e.deltaY*.0014;
      targetZoom = THREE.MathUtils.clamp(targetZoom,.25,1.65);
    }, {passive:false});

    function openInfo(data) {
      projectMenu.classList.remove("open");
      infoKicker.textContent=data.kicker;
      infoTitle.textContent=data.title;
      infoDescription.textContent=data.description;
      tags.replaceChildren(...(data.tech||[]).map(t=>{
        const s=document.createElement("span"); s.textContent=t; return s;
      }));

      const els=[];
      (data.links||[]).forEach(link=>{
        const a=document.createElement("a");
        a.className="action";
        a.href=link.href;
        a.textContent=link.label;
        if(link.external){a.target="_blank";a.rel="noopener noreferrer";}
        els.push(a);
      });
      const back=document.createElement("button");
      back.className="action";
      back.textContent="Kembali";
      back.onclick=()=>infoPanel.classList.remove("open");
      els.push(back);
      actions.replaceChildren(...els);
      infoPanel.classList.add("open");
      intro.style.opacity=".18";
    }

    function showMenu() {
      infoPanel.classList.remove("open");
      projectMenu.classList.add("open");
    }

    function focusNode(id) {
      const entry=nodes.find(n=>n.data.id===id);
      if(!entry) return;

      if(mode==="solar"){
        openInfo(entry.data);
        return;
      }

      // Arah kamera dari pusat globe.
      world.updateMatrixWorld(true);
      const center=new THREE.Vector3();
      world.getWorldPosition(center);
      const targetDir=camera.position.clone().sub(center).normalize();

      // Posisi lokal node harus diarahkan ke targetDir.
      const localDir=entry.globePos.clone().normalize();
      const endQ=new THREE.Quaternion().setFromUnitVectors(localDir,targetDir);
      const startQ=world.quaternion.clone();

      focusAnim={
        startQ,
        endQ,
        start:performance.now(),
        duration:900,
        data:entry.data
      };
    }

    function selectNode(id) {
      if(id==="menu"){ showMenu(); return; }
      focusNode(id);
    }

    DATA.filter(d=>d.type==="project").forEach(d=>{
      const b=document.createElement("button");
      b.className="menu-item";
      b.innerHTML=`<span>${d.title}</span><span>◎</span>`;
      b.onclick=()=>{ projectMenu.classList.remove("open"); focusNode(d.id); };
      menuList.appendChild(b);
    });

    document.getElementById("closeMenu").onclick=()=>projectMenu.classList.remove("open");
    document.getElementById("closeInfo").onclick=()=>{
      infoPanel.classList.remove("open");
      intro.style.opacity="";
    };

    document.getElementById("resetButton").onclick=()=>{
      targetRotationX=0;
      targetRotationY=0;
      targetZoom=1;
      focusAnim=null;
      projectMenu.classList.remove("open");
      infoPanel.classList.remove("open");
      intro.style.opacity="";
    };

    function layout() {
      if(innerWidth<=980){
        world.position.set(0,-.55,0);
      }else{
        world.position.set(1.85,0,0);
      }
    }
    layout();

    const clock=new THREE.Clock();

    function animate(now){
      const elapsed=clock.getElapsedTime();

      zoom += (targetZoom-zoom)*.08;
      updateMode();

      if(focusAnim){
        const t=Math.min(1,(now-focusAnim.start)/focusAnim.duration);
        const e=t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
        world.quaternion.slerpQuaternions(focusAnim.startQ,focusAnim.endQ,e);

        if(t>=1){
          const data=focusAnim.data;
          focusAnim=null;
          const eu=new THREE.Euler().setFromQuaternion(world.quaternion,"XYZ");
          rotationX=targetRotationX=eu.x;
          rotationY=targetRotationY=eu.y;
          setTimeout(()=>openInfo(data),130);
        }
      }else{
        rotationX += (targetRotationX-rotationX)*.08;
        rotationY += (targetRotationY-rotationY)*.08;
        world.rotation.set(rotationX,rotationY,0);
      }

      // Scale normal. Morph mode tidak menggerakkan pusat world.
      const visualScale = THREE.MathUtils.lerp(.78,1.2,smoothstep(.25,1.65,zoom));
      world.scale.setScalar(visualScale);

      solar.visible = solarBlend > .02;
      globe.visible = solarBlend < .98;

      pointMaterial.opacity = .82*(1-solarBlend);
      glow.material.opacity = .025*(1-flatBlend)*(1-solarBlend);

      const positions=pointGeometry.attributes.position.array;
      for(let i=0;i<pointCount;i++){
        const ix=i*3;
        positions[ix]=THREE.MathUtils.lerp(spherePositions[ix],flatPositions[ix],flatBlend);
        positions[ix+1]=THREE.MathUtils.lerp(spherePositions[ix+1],flatPositions[ix+1],flatBlend);
        positions[ix+2]=THREE.MathUtils.lerp(spherePositions[ix+2],flatPositions[ix+2],flatBlend);
      }
      pointGeometry.attributes.position.needsUpdate=true;

      nodes.forEach((n,index)=>{
        if(solarBlend>.02){
          const about=n.data.id==="about";
          const angle=n.solarAngle+elapsed*(about?0:.18/(1+n.solarRadius*.25));
          const solarPos=about
            ? new THREE.Vector3(0,0,.1)
            : new THREE.Vector3(Math.cos(angle)*n.solarRadius,Math.sin(angle)*n.solarRadius,.1);

          n.group.position.lerpVectors(
            n.globePos.clone().lerp(n.flatPos,flatBlend),
            solarPos,
            solarBlend
          );

          // Solar mode: ikon menghadap kamera agar mudah dibaca.
          if(solarBlend>.5) n.group.quaternion.copy(camera.quaternion);
        }else{
          n.group.position.lerpVectors(n.globePos,n.flatPos,flatBlend);

          if(flatBlend<.5){
            // Globe mode: ikon mengikuti rotasi globe dan menempel tangensial.
            n.group.quaternion.setFromUnitVectors(zAxis,n.globePos.clone().normalize());
          }else{
            // Flat mode: semua ikon menghadap ke depan.
            n.group.quaternion.identity();
          }
        }

        const base=n.data.id==="about" ? 1.22 : 1;
        const sunBoost=n.data.id==="about" ? 1+solarBlend*.8 : 1;
        n.group.scale.setScalar(base*sunBoost);
      });

      orbitA.rotation.z += .0008;
      orbitB.rotation.y -= .0006;
      stars.rotation.y += .00006;

      renderer.render(scene,camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    addEventListener("resize",()=>{
      camera.aspect=innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(devicePixelRatio||1,1.7));
      renderer.setSize(innerWidth,innerHeight);
      layout();
    });

    setTimeout(()=>loading.classList.add("hide"),700);
  </script>
</body>
</html>
