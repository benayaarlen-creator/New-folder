<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#01070b" />

  <title>Benaya Arlen | Holographic Globe Portfolio</title>

  <meta
    name="description"
    content="Portofolio interaktif Benaya Arlen dalam bentuk globe hologram 3D."
  />

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"
      }
    }
  </script>

  <style>
    :root {
      --bg: #01070b;
      --panel: rgba(2, 15, 23, 0.9);
      --cyan: #58f7ff;
      --cyan-soft: rgba(88, 247, 255, 0.24);
      --white: #efffff;
      --muted: #8eb6c0;
      --line: rgba(88, 247, 255, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--white);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    button,
    a {
      font: inherit;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    a {
      text-decoration: none;
    }

    #scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .vignette,
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .vignette {
      z-index: 3;
      background:
        radial-gradient(circle at center, transparent 45%, rgba(0, 3, 6, 0.76) 100%);
    }

    .scanlines {
      z-index: 4;
      opacity: 0.1;
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 3px,
          rgba(88, 247, 255, 0.12) 4px
        );
    }

    .hud-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      min-height: 74px;
      padding:
        max(14px, env(safe-area-inset-top))
        max(20px, env(safe-area-inset-right))
        12px
        max(20px, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background:
        linear-gradient(to bottom, rgba(1, 7, 11, 0.93), rgba(1, 7, 11, 0));
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .brand-mark {
      position: relative;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--cyan);
      border-radius: 50%;
      color: var(--cyan);
      font-size: 0.72rem;
      font-weight: 900;
      box-shadow:
        inset 0 0 18px rgba(88, 247, 255, 0.25),
        0 0 18px rgba(88, 247, 255, 0.28);
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      inset: -6px;
      border: 1px dashed rgba(88, 247, 255, 0.32);
      border-radius: 50%;
      animation: spin 12s linear infinite;
    }

    .brand-copy strong,
    .brand-copy span {
      display: block;
    }

    .brand-copy strong {
      font-size: 0.78rem;
    }

    .brand-copy span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.54rem;
      letter-spacing: 0.12em;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
      font-size: 0.61rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #67ffb2;
      box-shadow: 0 0 12px #67ffb2;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .intro {
      position: fixed;
      left: max(24px, env(safe-area-inset-left));
      top: 50%;
      z-index: 15;
      width: min(390px, 34vw);
      transform: translateY(-50%);
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .intro-kicker {
      margin: 0 0 14px;
      color: var(--cyan);
      font-size: 0.66rem;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .intro h1 {
      margin: 0;
      font-size: clamp(2.7rem, 5.7vw, 6.1rem);
      line-height: 0.86;
      letter-spacing: -0.065em;
      text-transform: uppercase;
      text-shadow:
        0 0 6px rgba(239, 255, 255, 0.64),
        0 0 23px rgba(88, 247, 255, 0.26);
    }

    .intro h1 span {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1px rgba(88, 247, 255, 0.78);
      text-shadow: 0 0 20px rgba(88, 247, 255, 0.28);
    }

    .intro p {
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.72;
    }

    .guide {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .guide span {
      padding: 7px 9px;
      border: 1px solid rgba(88, 247, 255, 0.18);
      color: #7fdfe7;
      background: rgba(88, 247, 255, 0.03);
      font-size: 0.55rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .node-label {
      position: fixed;
      z-index: 14;
      min-width: 112px;
      max-width: 185px;
      padding: 9px 11px;
      border: 1px solid rgba(88, 247, 255, 0.38);
      border-radius: 4px;
      color: var(--white);
      background:
        linear-gradient(135deg, rgba(88, 247, 255, 0.1), transparent 65%),
        rgba(2, 15, 23, 0.84);
      box-shadow:
        inset 0 0 13px rgba(88, 247, 255, 0.05),
        0 0 15px rgba(88, 247, 255, 0.12);
      backdrop-filter: blur(8px);
      transform: translate(-50%, -50%);
      pointer-events: none;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transition:
        opacity 180ms ease,
        border-color 180ms ease;
    }

    .node-label.is-visible {
      visibility: visible;
    }

    .node-label:hover,
    .node-label:focus-visible {
      border-color: var(--cyan);
      outline: none;
    }

    .node-label small,
    .node-label strong {
      display: block;
    }

    .node-label small {
      color: var(--cyan);
      font-size: 0.5rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .node-label strong {
      margin-top: 4px;
      font-size: 0.68rem;
      line-height: 1.24;
      text-transform: uppercase;
    }

    .menu-panel {
      position: fixed;
      top: 50%;
      right: max(24px, env(safe-area-inset-right));
      z-index: 18;
      width: min(320px, 30vw);
      padding: 19px;
      border: 1px solid rgba(88, 247, 255, 0.3);
      border-radius: 12px;
      background:
        linear-gradient(140deg, rgba(88, 247, 255, 0.08), transparent 45%),
        rgba(2, 15, 23, 0.84);
      box-shadow:
        inset 0 0 24px rgba(88, 247, 255, 0.05),
        0 0 30px rgba(0, 217, 255, 0.1);
      backdrop-filter: blur(13px);
      transform: translateY(-50%) translateX(calc(100% + 50px));
      opacity: 0;
      transition:
        transform 360ms cubic-bezier(0.2, 0.8, 0.2, 1),
        opacity 250ms ease;
    }

    .menu-panel.is-open {
      transform: translateY(-50%) translateX(0);
      opacity: 1;
    }

    .panel-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 15px;
    }

    .panel-heading span {
      color: var(--cyan);
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .tiny-button {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(88, 247, 255, 0.24);
      color: var(--cyan);
      background: rgba(88, 247, 255, 0.04);
      cursor: pointer;
    }

    .menu-list {
      display: grid;
      gap: 8px;
    }

    .menu-item {
      width: 100%;
      min-height: 47px;
      padding: 0 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border: 1px solid rgba(88, 247, 255, 0.15);
      color: var(--muted);
      background: rgba(88, 247, 255, 0.02);
      text-align: left;
      cursor: pointer;
    }

    .menu-item:hover,
    .menu-item:focus-visible {
      color: var(--white);
      border-color: var(--cyan);
      background: rgba(88, 247, 255, 0.07);
      outline: none;
    }

    .menu-item span:first-child {
      font-size: 0.67rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .menu-item span:last-child {
      color: var(--cyan);
    }

    .info-panel {
      position: fixed;
      left: 50%;
      bottom: max(24px, calc(24px + env(safe-area-inset-bottom)));
      z-index: 30;
      width: min(720px, calc(100% - 36px));
      padding: clamp(24px, 4vw, 42px);
      border: 1px solid rgba(88, 247, 255, 0.48);
      border-radius: 17px;
      background:
        linear-gradient(135deg, rgba(88, 247, 255, 0.1), transparent 42%),
        rgba(2, 15, 23, 0.96);
      box-shadow:
        inset 0 0 30px rgba(88, 247, 255, 0.06),
        0 0 40px rgba(0, 217, 255, 0.22);
      backdrop-filter: blur(17px);
      transform: translate(-50%, calc(100% + 70px));
      opacity: 0;
      visibility: hidden;
      transition:
        transform 390ms cubic-bezier(0.2, 0.8, 0.2, 1),
        opacity 240ms ease,
        visibility 240ms ease;
    }

    .info-panel.is-open {
      transform: translate(-50%, 0);
      opacity: 1;
      visibility: visible;
    }

    .info-topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    .info-kicker {
      color: var(--cyan);
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .info-title {
      margin: 10px 0 0;
      font-size: clamp(1.9rem, 5vw, 3.8rem);
      line-height: 0.95;
      letter-spacing: -0.045em;
      text-transform: uppercase;
    }

    .info-description {
      max-width: 600px;
      margin: 19px 0 0;
      color: #a9c8d0;
      font-size: 0.93rem;
      line-height: 1.72;
    }

    .tech-list {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tech-list span {
      padding: 6px 9px;
      border: 1px solid rgba(88, 247, 255, 0.2);
      color: var(--cyan);
      background: rgba(88, 247, 255, 0.035);
      font-size: 0.57rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .panel-actions {
      margin-top: 25px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .action-button {
      min-height: 45px;
      padding: 0 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: 1px solid rgba(88, 247, 255, 0.55);
      color: var(--white);
      background: rgba(88, 247, 255, 0.08);
      font-size: 0.66rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .action-button.secondary {
      color: var(--muted);
      border-color: rgba(142, 182, 192, 0.25);
      background: rgba(255, 255, 255, 0.02);
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      background: #01070b;
      transition: opacity 500ms ease, visibility 500ms ease;
    }

    .loading.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader {
      width: 86px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid var(--cyan);
      border-radius: 50%;
      box-shadow:
        inset 0 0 20px rgba(88, 247, 255, 0.26),
        0 0 25px rgba(88, 247, 255, 0.3);
      animation: spin 2.3s linear infinite;
    }

    .loader::before {
      content: "BA";
      color: var(--cyan);
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0.1em;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      50% {
        opacity: 0.35;
      }
    }

    @media (max-width: 980px) {
      .intro {
        top: 105px;
        left: 50%;
        width: min(720px, calc(100% - 40px));
        text-align: center;
        transform: translateX(-50%);
      }

      .intro h1 {
        font-size: clamp(2.5rem, 11vw, 5.3rem);
      }

      .intro p {
        max-width: 590px;
        margin-inline: auto;
      }

      .guide {
        justify-content: center;
      }

      .menu-panel {
        top: auto;
        right: 18px;
        left: 18px;
        bottom: max(18px, env(safe-area-inset-bottom));
        width: auto;
        transform: translateY(calc(100% + 50px));
      }

      .menu-panel.is-open {
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .brand-copy,
      .status span:last-child {
        display: none;
      }

      .intro {
        top: 82px;
      }

      .intro h1 {
        font-size: clamp(2.15rem, 13vw, 4.2rem);
      }

      .intro p {
        display: none;
      }

      .guide {
        margin-top: 13px;
      }

      .guide span:nth-child(3) {
        display: none;
      }

      .node-label {
        min-width: 94px;
        max-width: 125px;
        padding: 7px 8px;
      }

      .node-label strong {
        font-size: 0.56rem;
      }

      .info-panel {
        max-height: 63svh;
        overflow-y: auto;
        padding: 23px;
      }

      .info-title {
        font-size: clamp(1.65rem, 9vw, 2.8rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

<body>
  <canvas id="scene" aria-label="Globe portofolio hologram interaktif"></canvas>

  <div class="vignette" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <div class="loading" id="loading">
    <div class="loader" aria-label="Memuat sistem"></div>
  </div>

  <header class="hud-header">
    <a class="brand" href="#" id="homeButton" aria-label="Kembali ke posisi awal globe">
      <span class="brand-mark">BA</span>
      <span class="brand-copy">
        <strong>Benaya Arlen</strong>
        <span>Holographic Portfolio System</span>
      </span>
    </a>

    <div class="status">
      <span class="status-dot"></span>
      <span>System online</span>
    </div>
  </header>

  <aside class="intro" id="intro">
    <p class="intro-kicker">Interactive Portfolio / 2026</p>
    <h1>Benaya <span>Arlen</span></h1>
    <p>
      Putar globe, pilih ikon, lalu tekan tombol <strong>OPEN</strong>
      untuk membuka halaman detail proyek.
    </p>

    <div class="guide">
      <span>Geser: Putar</span>
      <span>Pinch: Zoom</span>
      <span>Tap: Pilih Titik</span>
    </div>
  </aside>

  <div id="labelsRoot"></div>

  <aside class="menu-panel" id="menuPanel" aria-hidden="true">
    <div class="panel-heading">
      <span>Project Navigation</span>
      <button class="tiny-button" id="closeMenu" type="button" aria-label="Tutup menu">✕</button>
    </div>

    <div class="menu-list" id="menuList"></div>
  </aside>

  <section class="info-panel" id="infoPanel" aria-hidden="true">
    <div class="info-topline">
      <div>
        <span class="info-kicker" id="infoKicker">Data Node</span>
        <h2 class="info-title" id="infoTitle">Project</h2>
      </div>

      <button class="tiny-button" id="closeInfo" type="button" aria-label="Tutup informasi">✕</button>
    </div>

    <p class="info-description" id="infoDescription"></p>
    <div class="tech-list" id="techList"></div>
    <div class="panel-actions" id="panelActions"></div>
  </section>

  <script type="module">
    import * as THREE from "three";
    const NODE_DATA = [
      {
        id: "menu",
        type: "system",
        icon: "☰",
        label: "Menu",
        latitude: 18,
        longitude: -28,
        kicker: "SYSTEM NODE",
        title: "Project Menu",
        description: "Menampilkan daftar proyek yang tersedia pada globe.",
        tech: []
      },
      {
        id: "about",
        type: "system",
        icon: "i",
        label: "Tentang Saya",
        latitude: 47,
        longitude: 47,
        kicker: "IDENTITY NODE",
        title: "Benaya Arlen",

          "Software developer dan AI enthusiast yang tertarik pada pengembangan web, aplikasi, antarmuka interaktif, pengolahan data, serta kecerdasan buatan.",
        tech: [
          "Web Development",

          "UI Exploration",

        ],
        links: [
          {

          }
        ]
      },
      {

        longitude: 15,
        kicker: "PROJECT NODE / 001",
        title: "Multimodal Emotion Recognition",
        description:
          "Sistem deteksi emosi berbasis audio dan ekspresi wajah menggunakan Convolutional Recurrent Neural Network dan Model-Level Fusion pada dataset RAVDESS.",
        tech: ["Python", "TensorFlow", "OpenCV", "Librosa", "CRNN"],
        links: [
          {
            label: "Open",

          }
        ]
      },
      {
        id: "chatbot",
        type: "project",
        icon: "CB",
        label: "Medical Chatbot",
        latitude: 24,
        longitude: 122,
        kicker: "PROJECT NODE / 002",
        title: "Medical Chatbot",
        description:
          "Chatbot berbasis Natural Language Processing untuk memahami masukan mengenai gejala awal dan memberikan respons melalui alur percakapan terstruktur.",
        tech: ["Python", "RASA NLU", "NLP", "Chatbot"],
        links: [

        ]
      },
      {
        id: "onda",
        type: "project",
        icon: "OP",
        label: "Onda Printing",
        latitude: -34,
        longitude: 82,
        kicker: "PROJECT NODE / 003",
        title: "Onda Printing Website",
        description:
          "Website perusahaan responsif yang menampilkan profil, layanan, produk, dan informasi kontak Onda Printing.",
        tech: ["HTML5", "CSS3", "JavaScript", "Responsive Web"],
        links: [

          }
        ]
      },
      {
        id: "portfolio",
        type: "project",
        icon: "3D",
        label: "Holographic Portfolio",
        latitude: -26,
        longitude: -75,
        kicker: "PROJECT NODE / 004",
        title: "Holographic Globe Portfolio",
        description:
          "Eksperimen antarmuka portofolio dengan globe WebGL 3D, titik hologram, navigasi berbasis node, animasi fokus, dan panel informasi interaktif.",
        tech: ["Three.js", "WebGL", "JavaScript", "CSS", "Responsive UI"],
        links: [
          {
            label: "Repository",
            href: "https://github.com/benayaarlen-creator/New-folder",
            external: true
          }
        ]
      },
      {
        id: "contact",
        type: "system",
        icon: "@",
        label: "Kontak",
        latitude: 4,
        longitude: 194,
        kicker: "COMMUNICATION NODE",
        title: "Hubungi Saya",
        description:
          "Terbuka untuk peluang kerja, magang, pengembangan website, kolaborasi proyek, dan diskusi teknologi.",
        tech: ["Email", "GitHub"],
        links: [
          {
            label: "Email",
            href: "mailto:gammablacksmitch@gmail.com"
          },
          {
            label: "GitHub",
            href: "https://github.com/benayaarlen-creator",
            external: true
          }
        ]
      }
    ];

    const canvas = document.getElementById("scene");
    const loading = document.getElementById("loading");
    const labelsRoot = document.getElementById("labelsRoot");
    const menuPanel = document.getElementById("menuPanel");
    const menuList = document.getElementById("menuList");
    const closeMenu = document.getElementById("closeMenu");
    const infoPanel = document.getElementById("infoPanel");
    const infoKicker = document.getElementById("infoKicker");
    const infoTitle = document.getElementById("infoTitle");
    const infoDescription = document.getElementById("infoDescription");
    const techList = document.getElementById("techList");
    const panelActions = document.getElementById("panelActions");
    const closeInfo = document.getElementById("closeInfo");
    const homeButton = document.getElementById("homeButton");
    const intro = document.getElementById("intro");

    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x01070b, 0.055);

    const camera = new THREE.PerspectiveCamera(
      44,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0.3, 8.7);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false,
      powerPreference: "high-performance"
    });

    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x01070b, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    /*
      KONTROL KHUSUS:
      Kamera tetap diam. Yang diputar adalah worldGroup sehingga globe
      tidak berpindah posisi pada layar ketika digeser atau di-scroll.
    */
    let rotationX = 0;
    let rotationY = 0;
    let rotationZ = 0;

    let targetRotationX = 0;
    let targetRotationY = 0;
    let targetRotationZ = 0;

    let globeScale = 1;
    let targetGlobeScale = 1;

    let isDragging = false;
    let lastPointerX = 0;
    let lastPointerY = 0;
    let dragDistance = 0;

    let activePointers = new Map();
    let previousPinchDistance = 0;
    let autoRotateEnabled = !reduceMotion;

    const worldGroup = new THREE.Group();
    scene.add(worldGroup);

    const globeGroup = new THREE.Group();
    worldGroup.add(globeGroup);

    const orbitGroup = new THREE.Group();
    worldGroup.add(orbitGroup);

    const GLOBE_RADIUS = 2.55;

    function createStars() {
      const count = window.innerWidth < 700 ? 850 : 1450;
      const positions = new Float32Array(count * 3);

      for (let i = 0; i < count; i += 1) {
        const radius = 18 + Math.random() * 32;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = radius * Math.cos(phi);
        positions[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

      const material = new THREE.PointsMaterial({
        color: 0x9df9ff,
        size: 0.034,
        transparent: true,
        opacity: 0.58,
        depthWrite: false
      });

      return new THREE.Points(geometry, material);
    }

    const stars = createStars();
    scene.add(stars);

    function randomPointOnSphere(radius) {
      const u = Math.random();
      const v = Math.random();
      const theta = 2 * Math.PI * u;
      const phi = Math.acos(2 * v - 1);

      return new THREE.Vector3(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    function createPointGlobe() {
      const count = window.innerWidth < 700 ? 2500 : 4700;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);

      const colorA = new THREE.Color(0x34e9ff);
      const colorB = new THREE.Color(0x1c7dff);

      for (let i = 0; i < count; i += 1) {
        const point = randomPointOnSphere(
          GLOBE_RADIUS + (Math.random() - 0.5) * 0.045
        );

        positions[i * 3] = point.x;
        positions[i * 3 + 1] = point.y;
        positions[i * 3 + 2] = point.z;

        const mixed = colorA.clone().lerp(colorB, Math.random() * 0.65);
        colors[i * 3] = mixed.r;
        colors[i * 3 + 1] = mixed.g;
        colors[i * 3 + 2] = mixed.b;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

      const material = new THREE.PointsMaterial({
        size: window.innerWidth < 700 ? 0.027 : 0.022,
        vertexColors: true,
        transparent: true,
        opacity: 0.84,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      return new THREE.Points(geometry, material);
    }

    const globePoints = createPointGlobe();
    globeGroup.add(globePoints);

    const sphereGlow = new THREE.Mesh(
      new THREE.SphereGeometry(GLOBE_RADIUS * 1.012, 64, 64),
      new THREE.MeshBasicMaterial({
        color: 0x0ddfff,
        transparent: true,
        opacity: 0.022,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      })
    );
    globeGroup.add(sphereGlow);

    const outerGlow = new THREE.Mesh(
      new THREE.SphereGeometry(GLOBE_RADIUS * 1.055, 64, 64),
      new THREE.MeshBasicMaterial({
        color: 0x1de8ff,
        transparent: true,
        opacity: 0.018,
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      })
    );
    globeGroup.add(outerGlow);

    function createLatitudeRing(latitude) {
      const latRad = THREE.MathUtils.degToRad(latitude);
      const ringRadius = GLOBE_RADIUS * Math.cos(latRad);
      const y = GLOBE_RADIUS * Math.sin(latRad);
      const points = [];

      for (let i = 0; i <= 160; i += 1) {
        const angle = (i / 160) * Math.PI * 2;
        points.push(
          new THREE.Vector3(
            ringRadius * Math.cos(angle),
            y,
            ringRadius * Math.sin(angle)
          )
        );
      }

      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0x49efff,
        transparent: true,
        opacity: 0.115,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      return new THREE.Line(geometry, material);
    }

    [-60, -30, 0, 30, 60].forEach((latitude) => {
      globeGroup.add(createLatitudeRing(latitude));
    });

    function createLongitudeRing(longitude) {
      const points = [];
      const lonRad = THREE.MathUtils.degToRad(longitude);

      for (let i = 0; i <= 160; i += 1) {
        const latitude = -Math.PI / 2 + (i / 160) * Math.PI;

        points.push(
          new THREE.Vector3(
            GLOBE_RADIUS * Math.cos(latitude) * Math.cos(lonRad),
            GLOBE_RADIUS * Math.sin(latitude),
            GLOBE_RADIUS * Math.cos(latitude) * Math.sin(lonRad)
          )
        );
      }

      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0x49efff,
        transparent: true,
        opacity: 0.105,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      return new THREE.Line(geometry, material);
    }

    for (let longitude = 0; longitude < 180; longitude += 30) {
      globeGroup.add(createLongitudeRing(longitude));
    }

    function createOrbit(radius, opacity, rotation) {
      const points = [];

      for (let i = 0; i <= 200; i += 1) {
        const angle = (i / 200) * Math.PI * 2;

        points.push(
          new THREE.Vector3(
            radius * Math.cos(angle),
            0,
            radius * Math.sin(angle)
          )
        );
      }

      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0x45f4ff,
        transparent: true,
        opacity,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      const line = new THREE.LineLoop(geometry, material);
      line.rotation.set(...rotation);

      return line;
    }

    const orbitA = createOrbit(
      GLOBE_RADIUS * 1.3,
      0.22,
      [
        THREE.MathUtils.degToRad(67),
        0,
        THREE.MathUtils.degToRad(12)
      ]
    );

    const orbitB = createOrbit(
      GLOBE_RADIUS * 1.43,
      0.14,
      [
        THREE.MathUtils.degToRad(28),
        THREE.MathUtils.degToRad(65),
        THREE.MathUtils.degToRad(-18)
      ]
    );

    orbitGroup.add(orbitA, orbitB);

    function latLonToVector3(latitude, longitude, radius = GLOBE_RADIUS) {
      const lat = THREE.MathUtils.degToRad(latitude);
      const lon = THREE.MathUtils.degToRad(longitude);

      return new THREE.Vector3(
        radius * Math.cos(lat) * Math.cos(lon),
        radius * Math.sin(lat),
        radius * Math.cos(lat) * Math.sin(lon)
      );
    }

    function createIconTexture(text, isSystem = false) {
      const size = 256;
      const iconCanvas = document.createElement("canvas");
      iconCanvas.width = size;
      iconCanvas.height = size;

      const context = iconCanvas.getContext("2d");

      const gradient = context.createRadialGradient(
        size / 2,
        size / 2,
        10,
        size / 2,
        size / 2,
        size / 2
      );

      gradient.addColorStop(0, "rgba(235,255,255,0.96)");
      gradient.addColorStop(0.16, "rgba(88,247,255,0.5)");
      gradient.addColorStop(0.55, "rgba(0,217,255,0.10)");
      gradient.addColorStop(1, "rgba(0,217,255,0)");

      context.fillStyle = gradient;
      context.fillRect(0, 0, size, size);

      context.beginPath();
      context.arc(size / 2, size / 2, 78, 0, Math.PI * 2);
      context.fillStyle = isSystem
        ? "rgba(5,35,47,0.90)"
        : "rgba(3,25,37,0.90)";
      context.fill();

      context.lineWidth = 5;
      context.strokeStyle = "rgba(88,247,255,0.95)";
      context.shadowColor = "#58f7ff";
      context.shadowBlur = 20;
      context.stroke();

      context.shadowBlur = 14;
      context.fillStyle = "#eaffff";
      context.font =
        `900 ${text.length > 1 ? 54 : 78}px system-ui, sans-serif`;
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.fillText(text, size / 2, size / 2 + 2);

      const texture = new THREE.CanvasTexture(iconCanvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.needsUpdate = true;

      return texture;
    }

    const nodeObjects = [];
    const raycastTargets = [];

    NODE_DATA.forEach((data) => {
      const anchor = new THREE.Group();
      anchor.position.copy(
        latLonToVector3(
          data.latitude,
          data.longitude,
          GLOBE_RADIUS + 0.11
        )
      );
      anchor.userData = data;

      const direction = anchor.position.clone().normalize();
      const stemStart = direction.clone().multiplyScalar(GLOBE_RADIUS);
      const stemEnd = direction.clone().multiplyScalar(GLOBE_RADIUS + 0.27);

      const stemGeometry = new THREE.BufferGeometry().setFromPoints([
        stemStart,
        stemEnd
      ]);

      const stem = new THREE.Line(
        stemGeometry,
        new THREE.LineBasicMaterial({
          color: 0x58f7ff,
          transparent: true,
          opacity: 0.6,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      );

      globeGroup.add(stem);

      const pulse = new THREE.Mesh(
        new THREE.RingGeometry(0.095, 0.125, 32),
        new THREE.MeshBasicMaterial({
          color: 0x58f7ff,
          transparent: true,
          opacity: 0.72,
          side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      );

      const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: createIconTexture(data.icon, data.type === "system"),
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );

      sprite.scale.setScalar(data.type === "system" ? 0.62 : 0.55);
      sprite.userData = data;

      anchor.add(pulse);
      anchor.add(sprite);
      globeGroup.add(anchor);

      const label = document.createElement("button");
      label.type = "button";
      label.className = "node-label";
      label.dataset.nodeId = data.id;
      label.innerHTML = `
        <small>${data.type === "project" ? "Project Node" : "System Node"}</small>
        <strong>${data.label}</strong>
      `;
      label.addEventListener("click", () => selectNode(data.id));
      labelsRoot.appendChild(label);

      nodeObjects.push({
        data,
        anchor,
        pulse,
        sprite,
        label
      });

      raycastTargets.push(sprite);
    });

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function getPointerDistance() {
      const points = [...activePointers.values()];

      if (points.length < 2) {
        return 0;
      }

      return Math.hypot(
        points[0].x - points[1].x,
        points[0].y - points[1].y
      );
    }

    renderer.domElement.addEventListener("pointerdown", (event) => {
      renderer.domElement.setPointerCapture(event.pointerId);

      activePointers.set(event.pointerId, {
        x: event.clientX,
        y: event.clientY
      });

      isDragging = true;
      autoRotateEnabled = false;
      lastPointerX = event.clientX;
      lastPointerY = event.clientY;
      dragDistance = 0;

      if (activePointers.size === 2) {
        previousPinchDistance = getPointerDistance();
      }
    });

    renderer.domElement.addEventListener("pointermove", (event) => {
      if (!activePointers.has(event.pointerId)) {
        return;
      }

      activePointers.set(event.pointerId, {
        x: event.clientX,
        y: event.clientY
      });

      if (activePointers.size === 2) {
        const pinchDistance = getPointerDistance();

        if (previousPinchDistance > 0) {
          const difference = pinchDistance - previousPinchDistance;
          targetGlobeScale += difference * 0.0025;
          targetGlobeScale = THREE.MathUtils.clamp(
            targetGlobeScale,
            0.72,
            1.35
          );
        }

        previousPinchDistance = pinchDistance;
        return;
      }

      if (!isDragging) {
        return;
      }

      const deltaX = event.clientX - lastPointerX;
      const deltaY = event.clientY - lastPointerY;

      dragDistance += Math.abs(deltaX) + Math.abs(deltaY);

      targetRotationY += deltaX * 0.0065;
      targetRotationX += deltaY * 0.005;
      targetRotationX = THREE.MathUtils.clamp(
        targetRotationX,
        -Math.PI * 0.46,
        Math.PI * 0.46
      );

      lastPointerX = event.clientX;
      lastPointerY = event.clientY;
    });

    function finishPointer(event) {
      const wasTap = dragDistance < 10 && activePointers.size <= 1;

      activePointers.delete(event.pointerId);

      if (
        renderer.domElement.hasPointerCapture &&
        renderer.domElement.hasPointerCapture(event.pointerId)
      ) {
        renderer.domElement.releasePointerCapture(event.pointerId);
      }

      if (activePointers.size === 0) {
        isDragging = false;
        previousPinchDistance = 0;
      }

      if (!wasTap) {
        return;
      }

      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);

      const intersections = raycaster.intersectObjects(
        raycastTargets,
        false
      );

      if (intersections.length > 0) {
        selectNode(intersections[0].object.userData.id);
      }
    }

    renderer.domElement.addEventListener("pointerup", finishPointer);
    renderer.domElement.addEventListener("pointercancel", (event) => {
      activePointers.delete(event.pointerId);

      if (activePointers.size === 0) {
        isDragging = false;
        previousPinchDistance = 0;
      }
    });

    /*
      Scroll tidak lagi menggerakkan kamera.
      Scroll vertikal memutar globe secara horizontal.
      Ctrl/trackpad pinch mengubah ukuran globe.
    */
    renderer.domElement.addEventListener(
      "wheel",
      (event) => {
        event.preventDefault();
        autoRotateEnabled = false;

        if (event.ctrlKey) {
          targetGlobeScale -= event.deltaY * 0.0012;
          targetGlobeScale = THREE.MathUtils.clamp(
            targetGlobeScale,
            0.72,
            1.35
          );
        } else {
          targetRotationY += event.deltaY * 0.0025;
          targetRotationX += event.deltaX * 0.0015;
          targetRotationX = THREE.MathUtils.clamp(
            targetRotationX,
            -Math.PI * 0.46,
            Math.PI * 0.46
          );
        }
      },
      { passive: false }
    );

    const projectNodes = NODE_DATA.filter(
      (node) => node.type === "project"
    );

    projectNodes.forEach((project) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "menu-item";
      button.innerHTML = `
        <span>${project.title}</span>
        <span>◎</span>
      `;

      button.addEventListener("click", () => {
        closeMenuPanel();
        focusNode(project.id, true);
      });

      menuList.appendChild(button);
    });

    function openMenuPanel() {
      closeInfoPanel();

      menuPanel.classList.add("is-open");
      menuPanel.setAttribute("aria-hidden", "false");

      nodeObjects.forEach(({ data, label }) => {
        if (data.type === "project") {
          label.classList.add("is-visible");
        }
      });
    }

    function closeMenuPanel() {
      menuPanel.classList.remove("is-open");
      menuPanel.setAttribute("aria-hidden", "true");

      nodeObjects.forEach(({ label }) => {
        label.classList.remove("is-visible");
      });
    }

    function openInfoPanel(data) {
      closeMenuPanel();

      infoKicker.textContent = data.kicker;
      infoTitle.textContent = data.title;
      infoDescription.textContent = data.description;

      techList.replaceChildren(
        ...(data.tech || []).map((technology) => {
          const tag = document.createElement("span");
          tag.textContent = technology;
          return tag;
        })
      );

      const actions = [];

      (data.links || []).forEach((link) => {
        const anchor = document.createElement("a");
        anchor.className = "action-button";
        anchor.href = link.href;
        anchor.textContent = link.label;

        if (link.external) {
          anchor.target = "_blank";
          anchor.rel = "noopener noreferrer";
        }

        actions.push(anchor);
      });

      const closeButton = document.createElement("button");
      closeButton.type = "button";
      closeButton.className = "action-button secondary";
      closeButton.textContent = "Kembali ke Globe";
      closeButton.addEventListener("click", closeInfoPanel);
      actions.push(closeButton);

      panelActions.replaceChildren(...actions);

      infoPanel.classList.add("is-open");
      infoPanel.setAttribute("aria-hidden", "false");
      intro.style.opacity = "0.2";
    }

    function closeInfoPanel() {
      infoPanel.classList.remove("is-open");
      infoPanel.setAttribute("aria-hidden", "true");
      intro.style.opacity = "";
    }

    closeMenu.addEventListener("click", closeMenuPanel);
    closeInfo.addEventListener("click", closeInfoPanel);

    let focusAnimation = null;

    function easeInOutCubic(value) {
      return value < 0.5
        ? 4 * value * value * value
        : 1 - Math.pow(-2 * value + 2, 3) / 2;
    }

    function shortestAngleDifference(from, to) {
      return Math.atan2(
        Math.sin(to - from),
        Math.cos(to - from)
      );
    }

    /*
      Memutar globe agar node terpilih tepat menghadap kamera.

      Penting:
      Globe berada di kanan layar pada desktop. Oleh karena itu target
      tidak boleh selalu (0, 0, 1). Target harus dihitung dari pusat globe
      menuju posisi kamera.
    */
    function focusNode(nodeId, openAfterFocus = true) {
      const entry = nodeObjects.find(({ data }) => data.id === nodeId);

      if (!entry) {
        return;
      }

      autoRotateEnabled = false;

      worldGroup.updateMatrixWorld(true);
      camera.updateMatrixWorld(true);

      const globeCenterWorld = new THREE.Vector3();
      worldGroup.getWorldPosition(globeCenterWorld);

      const nodeWorldPosition = new THREE.Vector3();
      entry.anchor.getWorldPosition(nodeWorldPosition);

      const currentNodeDirection = nodeWorldPosition
        .clone()
        .sub(globeCenterWorld)
        .normalize();

      const targetCameraDirection = camera.position
        .clone()
        .sub(globeCenterWorld)
        .normalize();

      /*
        Quaternion delta membawa arah node saat ini menuju arah kamera.
        Karena worldGroup tetap pada posisi yang sama, globe tidak berpindah.
      */
      const deltaQuaternion = new THREE.Quaternion().setFromUnitVectors(
        currentNodeDirection,
        targetCameraDirection
      );

      const startQuaternion = worldGroup.quaternion.clone();
      const endQuaternion = deltaQuaternion
        .multiply(startQuaternion)
        .normalize();

      const startEuler = new THREE.Euler().setFromQuaternion(
        startQuaternion,
        "XYZ"
      );

      const endEuler = new THREE.Euler().setFromQuaternion(
        endQuaternion,
        "XYZ"
      );

      const deltaX = shortestAngleDifference(
        startEuler.x,
        endEuler.x
      );
      const deltaY = shortestAngleDifference(
        startEuler.y,
        endEuler.y
      );
      const deltaZ = shortestAngleDifference(
        startEuler.z,
        endEuler.z
      );

      focusAnimation = {
        startX: startEuler.x,
        startY: startEuler.y,
        startZ: startEuler.z,

        endX: startEuler.x + deltaX,
        endY: startEuler.y + deltaY,
        endZ: startEuler.z + deltaZ,

        startTime: performance.now(),
        duration: reduceMotion ? 1 : 1050,
        data: entry.data,
        openAfterFocus
      };

      targetRotationX = focusAnimation.endX;
      targetRotationY = focusAnimation.endY;
      targetRotationZ = focusAnimation.endZ;
    }

    function updateFocusAnimation(now) {
      if (!focusAnimation) {
        return;
      }

      const elapsed = now - focusAnimation.startTime;
      const progress = Math.min(
        1,
        elapsed / focusAnimation.duration
      );
      const eased = easeInOutCubic(progress);

      rotationX = THREE.MathUtils.lerp(
        focusAnimation.startX,
        focusAnimation.endX,
        eased
      );

      rotationY = THREE.MathUtils.lerp(
        focusAnimation.startY,
        focusAnimation.endY,
        eased
      );

      rotationZ = THREE.MathUtils.lerp(
        focusAnimation.startZ,
        focusAnimation.endZ,
        eased
      );

      globeScale += (targetGlobeScale - globeScale) * 0.09;

      worldGroup.rotation.set(
        rotationX,
        rotationY,
        rotationZ,
        "XYZ"
      );
      worldGroup.scale.setScalar(globeScale);

      if (progress >= 1) {
        const completed = focusAnimation;
        focusAnimation = null;

        targetRotationX = rotationX;
        targetRotationY = rotationY;
        targetRotationZ = rotationZ;

        if (completed.openAfterFocus) {
          window.setTimeout(() => {
            openInfoPanel(completed.data);
          }, reduceMotion ? 0 : 160);
        }
      }
    }

    function selectNode(nodeId) {
      const data = NODE_DATA.find((node) => node.id === nodeId);

      if (!data) {
        return;
      }

      if (nodeId === "menu") {
        focusNode(nodeId, false);

        window.setTimeout(
          openMenuPanel,
          reduceMotion ? 0 : 700
        );

        return;
      }

      focusNode(nodeId, true);
    }

    homeButton.addEventListener("click", (event) => {
      event.preventDefault();

      closeMenuPanel();
      closeInfoPanel();

      autoRotateEnabled = !reduceMotion;
      focusAnimation = null;

      targetRotationX = 0;
      targetRotationY = 0;
      targetRotationZ = 0;
      targetGlobeScale = 1;
    });

    const tempWorld = new THREE.Vector3();
    const tempProjected = new THREE.Vector3();

    function updateNodeLabels() {
      nodeObjects.forEach(({ anchor, label }) => {
        anchor.getWorldPosition(tempWorld);

        const globeCenter = new THREE.Vector3();
        worldGroup.getWorldPosition(globeCenter);

        const normal = tempWorld
          .clone()
          .sub(globeCenter)
          .normalize();

        const directionToCamera = camera.position
          .clone()
          .sub(tempWorld)
          .normalize();

        const facing = normal.dot(directionToCamera);

        tempProjected.copy(tempWorld).project(camera);

        const x =
          (tempProjected.x * 0.5 + 0.5) * window.innerWidth;
        const y =
          (-tempProjected.y * 0.5 + 0.5) * window.innerHeight;

        label.style.left = `${x}px`;
        label.style.top = `${y - 45}px`;

        const shouldShow =
          label.classList.contains("is-visible") &&
          facing > 0.08 &&
          tempProjected.z < 1;

        label.style.opacity = shouldShow
          ? String(Math.min(1, 0.45 + facing))
          : "0";

        label.style.pointerEvents = shouldShow
          ? "auto"
          : "none";
      });
    }

    function updateResponsiveLayout() {
      if (window.innerWidth <= 640) {
        worldGroup.position.set(0, -0.65, 0);
        camera.position.z = 9.7;
      } else if (window.innerWidth <= 980) {
        worldGroup.position.set(0, -0.6, 0);
        camera.position.z = 9.1;
      } else {
        worldGroup.position.set(1.85, 0, 0);
        camera.position.z = 8.7;
      }

    }

    updateResponsiveLayout();

    const clock = new THREE.Clock();

    function animate(now) {
      const elapsed = clock.getElapsedTime();

      updateFocusAnimation(now);

      if (!focusAnimation) {
        if (autoRotateEnabled && !isDragging && activePointers.size === 0) {
          targetRotationY += 0.0013;
        }

        rotationX += (targetRotationX - rotationX) * 0.085;
        rotationY += (targetRotationY - rotationY) * 0.085;
        rotationZ += (targetRotationZ - rotationZ) * 0.085;
        globeScale += (targetGlobeScale - globeScale) * 0.09;

        worldGroup.rotation.set(
          rotationX,
          rotationY,
          rotationZ,
          "XYZ"
        );
        worldGroup.scale.setScalar(globeScale);
      }

      globePoints.rotation.y += reduceMotion ? 0 : 0.00065;
      sphereGlow.scale.setScalar(
        1 + Math.sin(elapsed * 1.8) * 0.006
      );
      outerGlow.scale.setScalar(
        1 + Math.sin(elapsed * 1.2) * 0.012
      );

      orbitA.rotation.z += reduceMotion ? 0 : 0.0009;
      orbitB.rotation.y -= reduceMotion ? 0 : 0.0007;
      stars.rotation.y += reduceMotion ? 0 : 0.00008;

      nodeObjects.forEach(({ pulse, sprite }, index) => {
        const pulseScale =
          1 + Math.sin(elapsed * 2.4 + index * 0.8) * 0.22;

        pulse.scale.setScalar(pulseScale);

        pulse.material.opacity =
          0.42 + Math.sin(elapsed * 2.4 + index) * 0.18;

        sprite.material.opacity =
          0.88 + Math.sin(elapsed * 1.8 + index) * 0.1;

        sprite.quaternion.copy(camera.quaternion);
        pulse.quaternion.copy(camera.quaternion);
      });

      updateNodeLabels();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);

    let resizeTimer;

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);

      resizeTimer = window.setTimeout(() => {
        camera.aspect =
          window.innerWidth / window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setPixelRatio(
          Math.min(window.devicePixelRatio || 1, 1.75)
        );

        renderer.setSize(
          window.innerWidth,
          window.innerHeight
        );

        updateResponsiveLayout();
      }, 100);
    });

    window.setTimeout(() => {
      loading.classList.add("is-hidden");
    }, 700);
  </script>
</body>
</html>
