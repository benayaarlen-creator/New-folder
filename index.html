<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#01070b" />

  <title>Benaya Arlen | Holographic Portfolio</title>

  <meta
    name="description"
    content="Portofolio hologram interaktif Benaya Arlen berbasis Three.js."
  />

  <link rel="stylesheet" href="styles.css" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js"
      }
    }
  </script>
</head>

<body>
  <canvas id="scene" aria-label="Globe portofolio hologram interaktif"></canvas>

  <div class="vignette" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <div class="loading" id="loading">
    <div class="loader">BA</div>
  </div>

  <header class="header">
    <button class="brand" id="resetButton" type="button">
      <span class="brand-mark">BA</span>

      <span class="brand-copy">
        <strong>Benaya Arlen</strong>
        <span>Holographic Portfolio System</span>
      </span>
    </button>

    <div class="status">System Online</div>
  </header>

  <aside class="intro" id="intro">
    <small>Interactive Portfolio / 2026</small>

    <h1>
      Benaya
      <span>Arlen</span>
    </h1>

    <p>
      Geser untuk memutar, scroll atau pinch untuk berpindah antara
      tampilan universe, globe, dan holographic data space.
    </p>

    <span class="mode-badge" id="modeBadge">Globe Mode</span>
  </aside>

  <aside class="zoom-panel">
    <div class="zoom-heading">
      <span>Zoom</span>
      <span id="zoomText">100%</span>
    </div>

    <div class="zoom-track">
      <div class="zoom-fill" id="zoomFill"></div>
    </div>

    <div class="zoom-controls">
      <button type="button" id="zoomOut" aria-label="Perkecil">−</button>
      <button type="button" id="zoomReset" aria-label="Kembali ke 100 persen">100%</button>
      <button type="button" id="zoomIn" aria-label="Perbesar">+</button>
    </div>
  </aside>

  <aside class="project-menu" id="projectMenu" aria-hidden="true">
    <div class="panel-heading">
      <span>Project Navigation</span>
      <button class="close-button" id="closeMenu" type="button">×</button>
    </div>

    <div class="menu-list" id="menuList"></div>
  </aside>

  <section class="info-panel" id="infoPanel" aria-hidden="true">
    <div class="panel-heading">
      <div>
        <span class="info-kicker" id="infoKicker"></span>
        <h2 id="infoTitle"></h2>
      </div>

      <button class="close-button" id="closeInfo" type="button">×</button>
    </div>

    <p id="infoDescription"></p>

    <div class="tags" id="tags"></div>
    <div class="actions" id="actions"></div>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
